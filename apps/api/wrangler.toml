name = "ftm-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "ftm"
database_id = "PLACEHOLDER_RUN_D1_CREATE"
migrations_dir = "src/db/migrations"

[[kv_namespaces]]
binding = "SESSIONS"
id = "PLACEHOLDER_RUN_KV_CREATE"

[triggers]
crons = ["0 1 * * *"]

[vars]
ENVIRONMENT = "development"

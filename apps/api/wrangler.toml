name = "ftm-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 數據庫綁定 ──
[[d1_databases]]
binding = "DB"
database_name = "ftm"
database_id = "PLACEHOLDER_RUN_D1_CREATE"
migrations_dir = "src/db/migrations"

# ── KV：存 refresh token ──
[[kv_namespaces]]
binding = "SESSIONS"
id = "PLACEHOLDER_RUN_KV_CREATE"

# ── 定時任務：每日掃描到期任務（Phase 5 啟用）──
# [triggers]
# crons = ["0 1 * * *"]

[vars]
ENVIRONMENT = "development"
